# This GitHub Actions workflow runs unit tests on every push/PR touching the
# agent, and the live DeepEval golden-question eval suite nightly only.
#
# The golden eval suite (backend/evals/) calls the real agent end-to-end —
# live Postgres + the mcp/ server + Redis + real OpenAI calls for both the
# agent and the DeepEval judge model — so it costs real API credits and
# takes real infra spin-up time. Running it on every push/PR would bill an
# LLM call per commit; keeping it nightly-only (plus available via
# workflow_dispatch for on-demand runs) matches the cadence a live-agent
# eval suite warrants without making routine pushes expensive.

name: CI

on:
  push:
    paths:
      - 'backend/agent/**'
  pull_request:
    paths:
      - 'backend/agent/**'
  schedule:
    - cron: '0 2 * * *'  # every day at 02:00 UTC
  workflow_dispatch: {}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          pytest -q backend/tests

  golden-eval:
    # Nightly cron or manual trigger only — see cost note above. Requires
    # the OPENAI_API_KEY repo secret; the step fails fast if it's unset.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_HOST: localhost
      REDIS_HOST: localhost
      MCP_SERVER_URL: http://localhost:9000/mcp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail fast if OPENAI_API_KEY is not configured
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repo secret is not set — the golden eval suite needs it for both the agent and the DeepEval judge model."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start Postgres, MCP server, and Redis
        run: docker compose up -d --build postgres mcp redis

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" postgres)" = "healthy" ] && [ "$(docker inspect -f "{{.State.Health.Status}}" mcp)" = "healthy" ]; do sleep 2; done'

      - name: Run DeepEval golden-question suite
        run: |
          deepeval test run backend/evals/test_golden_eval.py --identifier "ci-nightly-${{ github.run_id }}"

      - name: Tear down services
        if: always()
        run: docker compose down
